<!DOCTYPE html>

<html>
<head>
    <title>Boston Crime Data Story</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body style="font-family: Arial; padding: 20px;">

    
<h1>Boston Crime Data Story</h1>

<p>
    This analysis explores shooting trends across Boston districts from 2023 to 2026.
    We observe a decline in shootings over time, while crime type analysis shows that property and assault-related incidents remain common.
</p>

<p>Select a district to explore trends and crime types:</p>
<select id="districtSelect"></select>

<div id="chart1" style="width:100%; height:400px;"></div>
<div id="chart2" style="width:100%; height:500px;"></div>

<script>
    fetch('boston_crime_data.json')
    .then(res => res.json())
    .then(data => {

        let districtYear = data.district_year;
        let offenseData = data.offenses;

        let districts = Object.keys(districtYear);
        let select = document.getElementById("districtSelect");

        districts.forEach(d => {
            let opt = document.createElement("option");
            opt.value = d;
            opt.text = d;
            select.appendChild(opt);
        });

        function updateCharts(district) {

            let years = Object.keys(districtYear[district]).sort();
            let counts = years.map(y => districtYear[district][y]);

            Plotly.newPlot('chart1', [{
                x: years,
                y: counts,
                type: 'scatter',
                mode: 'lines+markers',
                line: { color: 'red', width: 3 }
            }], {
                title: `Declining Shooting Trend in District ${district}`,
                xaxis: {
                    title: "Year",
                    tickmode: "array",
                    tickvals: years
                },
                yaxis: { title: "Number of Shootings" }
            });

            let filtered = offenseData.filter(o => o.district === district);

            let countsMap = {};
            filtered.forEach(o => {
                countsMap[o.offense] = (countsMap[o.offense] || 0) + 1;
            });

            let sorted = Object.entries(countsMap)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 7);

            let x = sorted.map(d => d[0]);
            let y = sorted.map(d => d[1]);

            Plotly.newPlot('chart2', [{
                x: x,
                y: y,
                type: 'bar',
                marker: { color: 'orange' }
            }], {
                title: `Most Common Crime Types in District ${district}`,
                xaxis: {
                    title: "Crime Type",
                    tickangle: -45,
                    automargin: true
                },
                yaxis: {
                    title: "Count"
                },
                margin: {
                    b: 150
                }
            });
        }

        updateCharts(districts[0]);

        select.addEventListener("change", function() {
            updateCharts(this.value);
        });

    });
</script>


</body>
</html>
